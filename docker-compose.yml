version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ThomasShelby369
      MYSQL_DATABASE: atm_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mount schema.sql into the initialization folder to auto-seed on first run
      - ./atm_app/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pThomasShelby369"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=ThomasShelby369
      - DB_NAME=atm_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
